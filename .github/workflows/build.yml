name: Build Box3D FPS Tester APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java Development Kit Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK and NDK Tools
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          ndk-version: 25.2.9519653

      - name: Inject Looping Routine into Native Runtime
        run: |
          sed -i 's/engine->running = 1;/engine->running = 1; while(engine->running){ draw_frame(engine); }/g' app/jni/main.c

      - name: Setup Compatible Gradle Version
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.2

      - name: Build Debug Application Container
        run: |
          gradle assembleDebug --no-daemon

      - name: Archive Production Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: box3d3-fps-tester-apk
          path: app/build/outputs/apk/debug/app-debug.apk
