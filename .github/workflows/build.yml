name: Build Box3D FPS Tester APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java Development Kit Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK and NDK Tools
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          ndk-version: 25.2.9519653

      - name: Build Debug Application Container
        run: |
          chmod +x   gradlew 2>/dev/null || true
          gradle assembleDebug --no-daemon

      - name: Archive Production Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: box3d3-fps-tester-apk
          path: app/build/outputs/apk/debug/app-debug.apk
