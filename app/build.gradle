plugins {
    id 'com.android.application'
}

android {
    namespace 'com.box3d.fpstester'
    compileSdk 34

    defaultConfig {
        applicationId "com.box3d.fpstester"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    externalNativeBuild {
        ndkBuild {
            path "jni/Android.mk"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}
